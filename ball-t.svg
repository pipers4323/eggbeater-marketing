<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main ball gradient: bright yellow top-left → deep amber bottom-right -->
    <radialGradient id="ballFill" cx="36%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#FFF9C4"/>
      <stop offset="12%"  stop-color="#FFE000"/>
      <stop offset="40%"  stop-color="#FFAB00"/>
      <stop offset="75%"  stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>
    <!-- Subtle dark shadow on the lower-right rim -->
    <radialGradient id="rimDark" cx="62%" cy="68%" r="52%">
      <stop offset="0%"   stop-color="rgba(80,20,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(80,20,0,0)"/>
    </radialGradient>
    <!-- Specular highlight upper-left -->
    <radialGradient id="specular" cx="33%" cy="26%" r="38%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.88)"/>
      <stop offset="45%"  stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Clip everything to ball circle -->
    <clipPath id="ballClip">
      <circle cx="200" cy="200" r="184"/>
    </clipPath>
  </defs>

  <!-- ── Base ball ──────────────────────────────────────────────────── -->
  <circle cx="200" cy="200" r="184" fill="url(#ballFill)"/>

  <!-- ── Seam shadows (amber, 2px offset down-right for depth) ──────── -->
  <!-- Seam 1: horizontal S-curve (equatorial band) -->
  <path d="M 20,202 C 72,152 148,234 200,197 C 252,162 330,237 380,202"
        stroke="rgba(160,60,0,0.65)" stroke-width="10" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>
  <!-- Seam 2: upper-left → lower-right diagonal -->
  <path d="M 150,27 C 112,108 172,162 197,242 C 220,312 258,367 332,377"
        stroke="rgba(160,60,0,0.65)" stroke-width="10" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>
  <!-- Seam 3: upper-right → lower-left diagonal -->
  <path d="M 250,27 C 288,108 228,162 203,242 C 180,312 142,367 68,377"
        stroke="rgba(160,60,0,0.65)" stroke-width="10" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>

  <!-- ── White seam lines on top ────────────────────────────────────── -->
  <path d="M 20,200 C 72,150 148,232 200,195 C 252,160 330,235 380,200"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>
  <path d="M 148,25 C 110,106 170,160 195,240 C 218,310 256,365 330,375"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>
  <path d="M 252,25 C 290,106 230,160 205,240 C 182,310 144,365 70,375"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" clip-path="url(#ballClip)"/>

  <!-- ── Rim darkening ──────────────────────────────────────────────── -->
  <circle cx="200" cy="200" r="184" fill="url(#rimDark)"/>

  <!-- ── Specular highlight ─────────────────────────────────────────── -->
  <circle cx="200" cy="200" r="184" fill="url(#specular)"/>

  <!-- ── Outer edge definition ──────────────────────────────────────── -->
  <circle cx="200" cy="200" r="184" fill="none"
          stroke="rgba(160,60,0,0.25)" stroke-width="3"/>
</svg>
