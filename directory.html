<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#002868">
  <meta name="description" content="Find your water polo club on Eggbeater — live scores, schedules, and rosters for youth and high school teams.">
  <title>Find Your Club — Eggbeater Water Polo</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <link rel="stylesheet" href="styles.css?v=228">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #001a4a 0%, #002868 40%, #1a4898 100%);
      min-height: 100dvh;
      margin: 0;
      color: #e6edf3;
    }
    header { background: #002868; color: white; padding: 0; }
    .header-logo-band { background: #002868; padding: 12px 24px; display: flex; align-items: center; }
    .header-logo-band img { height: 72px; width: auto; display: block; }
    .header-title-band {
      background: linear-gradient(135deg, #1e40af 0%, #002868 100%);
      padding: 14px 24px 0;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .header-doc-title { font-size: 1.45rem; font-weight: 800; }
    .header-bottom {
      padding: 10px 0;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .teal-bar { height: 3px; background: #0891b2; }
    .dir-search-section {
      text-align: center;
      padding: 24px 20px 4px;
    }
    .dir-search-wrap {
      max-width: 480px;
      margin: 0 auto 24px;
      position: relative;
    }
    .dir-search {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 12px;
      background: rgba(255,255,255,.1);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, background .2s;
      box-sizing: border-box;
    }
    .dir-search::placeholder { color: rgba(255,255,255,.45); }
    .dir-search:focus {
      border-color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.15);
    }
    .dir-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      opacity: .5;
    }
    .dir-grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 540px) { .dir-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 840px) { .dir-grid { grid-template-columns: 1fr 1fr 1fr; } }

    .dir-card {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      text-decoration: none;
      color: inherit;
    }
    .dir-card:hover {
      background: rgba(255,255,255,.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    .dir-card:active { transform: scale(0.98); }

    .dir-card-logo {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: white;
      border: 1px solid rgba(255,255,255,.15);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }
    .dir-card-logo img {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: contain; /* contain keeps full logo visible, no cropping */
      padding: 2px;
    }
    .dir-card-info { flex: 1; min-width: 0; }
    .dir-card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      margin-bottom: 3px;
      line-height: 1.2;
    }
    .dir-card-meta {
      font-size: 0.78rem;
      color: rgba(255,255,255,.55);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir-card-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(255,255,255,.12);
      padding: 2px 8px;
      border-radius: 8px;
      color: rgba(255,255,255,.8);
    }
    .dir-card-arrow {
      color: rgba(255,255,255,.35);
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .dir-loading {
      text-align: center;
      color: rgba(255,255,255,.5);
      font-size: .95rem;
      padding: 40px 20px;
    }
    .dir-empty {
      text-align: center;
      color: rgba(255,255,255,.45);
      font-size: .95rem;
      padding: 40px 20px;
    }
    .dir-footer {
      text-align: center;
      padding: 24px 20px;
      color: rgba(255,255,255,.3);
      font-size: .78rem;
    }
    .dir-footer a { color: rgba(255,255,255,.5); text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="header-logo-band">
      <img src="logo_large.svg" alt="Eggbeater Water Polo">
    </div>
    <div class="header-title-band">
      <div class="header-doc-title">Find Your Club</div>
      <div class="header-bottom">Select your water polo club to view schedules, scores, and rosters</div>
    </div>
    <div class="teal-bar"></div>
  </header>

  <div class="dir-search-section">
    <div class="dir-search-wrap">
      <span class="dir-search-icon">🔍</span>
      <input type="text" class="dir-search" id="dir-search" placeholder="Search clubs…" autocomplete="off" aria-label="Search clubs" oninput="filterClubs()">
    </div>
  </div>

  <div class="dir-grid" id="dir-grid">
    <div class="dir-loading">Loading clubs…</div>
  </div>

  <div class="dir-footer">
    <a href="/about.html">Eggbeater Water Polo</a> &nbsp;&middot;&nbsp;
    <a href="/privacy.html">Privacy</a> &nbsp;&middot;&nbsp;
    <a href="/terms.html">Terms</a> &nbsp;&middot;&nbsp;
    <a href="mailto:hello@eggbeater.app">Contact</a>
    <br /><span style="margin-top:6px;display:inline-block">© 2026 Eggbeater Water Polo</span>
  </div>

  <script>
    const WORKER = 'https://ebwp-push.sarah-new.workers.dev';
    let allClubs = [];

    async function loadClubs() {
      const grid = document.getElementById('dir-grid');
      try {
        const res = await fetch(WORKER + '/clubs');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allClubs = data.clubs || [];
        renderClubs(allClubs);
      } catch (e) {
        grid.innerHTML = '<div class="dir-empty">Failed to load clubs. Please try again.</div>';
      }
    }

    function renderClubs(clubs) {
      const grid = document.getElementById('dir-grid');
      if (!clubs.length) {
        grid.innerHTML = '<div class="dir-empty">No clubs found.</div>';
        return;
      }

      grid.innerHTML = clubs.map(c => {
        const isHS = c.type === 'highschool';
        const badge = isHS ? '🎓 High School' : '🏊 Club';
        const logoSrc = c.logoUrl || c.logo;
        const logoHtml = logoSrc
          ? `<div class="dir-card-logo"><img src="${esc(logoSrc)}" alt="" loading="lazy"></div>`
          : `<div class="dir-card-logo">🤽</div>`;
        return `<a href="./?join=${encodeURIComponent(c.id)}" class="dir-card">
          ${logoHtml}
          <div class="dir-card-info">
            <div class="dir-card-name">${esc(c.name || c.id)}</div>
            <div class="dir-card-meta">
              <span class="dir-card-badge">${badge}</span>
            </div>
          </div>
          <div class="dir-card-arrow">›</div>
        </a>`;
      }).join('');
    }

    function filterClubs() {
      const q = document.getElementById('dir-search').value.toLowerCase().trim();
      if (!q) { renderClubs(allClubs); return; }
      const filtered = allClubs.filter(c =>
        (c.name || c.id || '').toLowerCase().includes(q) ||
        (c.id || '').toLowerCase().includes(q)
      );
      renderClubs(filtered);
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadClubs();
  </script>
</body>
</html>
